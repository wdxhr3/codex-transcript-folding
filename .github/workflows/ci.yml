name: fork-ci

on:
  pull_request:
    paths:
      - "codex-rs/tui/**"
      - "codex-rs/Cargo.toml"
      - "codex-rs/Cargo.lock"
      - "codex-rs/rust-toolchain.toml"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
    paths:
      - "codex-rs/tui/**"
      - "codex-rs/Cargo.toml"
      - "codex-rs/Cargo.lock"
      - "codex-rs/rust-toolchain.toml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fork-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_MIN_STACK: "8388608"

jobs:
  transcript-folding:
    name: Transcript folding checks
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    defaults:
      run:
        working-directory: codex-rs

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Test transcript folding state
        run: cargo test -p codex-tui --lib transcript_folding

      - name: Test transcript overlay rendering
        run: cargo test -p codex-tui --lib transcript_overlay_

      - name: Test folded-message resize reflow
        run: cargo test -p codex-tui --lib resize_reflow_replaces_folded_user_and_assistant_messages
